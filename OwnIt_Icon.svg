<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">

  <!-- Background — inset stroke so border isn't clipped -->
  <rect x="3" y="3" width="194" height="194" rx="42" fill="#0F2940" stroke="#00B4A6" stroke-width="6"/>

  <!-- Left gold triangle prong -->
  <polygon points="92,146 30,146 55,76" fill="#F4A300"/>

  <!-- Right gold triangle prong -->
  <polygon points="108,146 168,146 142,96" fill="#F4A300"/>

  <!-- Teal home plate -->
  <polygon points="100,50 124,106 124,160 76,160 76,106" fill="#00B4A6"/>

  <!-- Brim -->
  <rect x="28" y="141" width="144" height="22" rx="6" fill="#F4A300"/>

  <!-- Left gem -->
  <circle cx="55" cy="76" r="9" fill="#FFFFFF"/>

  <!-- Center gem -->
  <circle cx="100" cy="50" r="10" fill="#FFFFFF"/>

  <!-- Right gem -->
  <circle cx="142" cy="96" r="8" fill="#FFFFFF"/>

  <!-- Dashed ring -->
  <circle cx="100" cy="50" r="16" fill="none" stroke="#00B4A6" stroke-width="3" stroke-dasharray="4 3"/>

</svg>
